# Laptop Monitoring Agent Configuration (Backend-Driven)

# Render Backend URL (Example: https://your-app.onrender.com)
# agent.backend-url=https://your-render-service.onrender.com
agent.backend-url=https://laptop-monitor-backend.onrender.com

# App.java reads AGENT_BACKEND_URL, BACKEND_URL, RENDER_BACKEND_URL, or this agent.backend-url value.
# It will generate a unique device ID based on your PC's username.

# Disable web server for agent (it's a client application)
spring.main.web-application-type=none
