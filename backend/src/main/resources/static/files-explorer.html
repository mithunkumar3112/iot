<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Explorer</title>
  <link rel="stylesheet" href="dashboard-shell.css">
</head>
<body>
<template id="pageTemplate">
  <div class="grid cols-3" style="margin-bottom:18px;">
    <div class="card card-pad"><div class="metric-label">Unique files</div><div class="metric-value" id="fileCount">0</div></div>
    <div class="card card-pad"><div class="metric-label">Total size</div><div class="metric-value" id="fileSize">0 MB</div></div>
    <div class="card card-pad"><div class="metric-label">Status</div><div class="metric-value" id="fileStatus">Ready</div></div>
  </div>
  <div class="card">
    <div class="card-head">
      <div><div class="card-title">Files</div><div class="muted">Synced files from connected devices. Duplicate file paths are removed automatically.</div></div>
      <input class="input" id="searchInput" placeholder="Search files">
    </div>
    <div class="table-wrap">
      <table class="table">
        <thead><tr><th>Name</th><th>Device</th><th>Size</th><th>Modified</th><th>Actions</th></tr></thead>
        <tbody id="fileRows"><tr><td colspan="5"><div class="empty-state">Loading files...</div></td></tr></tbody>
      </table>
    </div>
  </div>
</template>
<script src="dashboard-shell.js"></script>
<script>
var content = document.getElementById('pageTemplate').content.cloneNode(true);
var shell = DashboardShell.init({ active: 'files', title: 'File Explorer', subtitle: 'Browse, preview, and download synced laptop files.', content: content });
var allFiles = [];

function formatBytes(bytes) {
  bytes = Number(bytes || 0);
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  if (bytes < 1024 * 1024 * 1024) return (bytes / 1024 / 1024).toFixed(1) + ' MB';
  return (bytes / 1024 / 1024 / 1024).toFixed(1) + ' GB';
}

function dedupe(files) {
  var unique = {};
  (Array.isArray(files) ? files : []).forEach(function(file) {
    if (!file || file.isDirectory) return;
    file = normalizeFile(file);
    if (!isSharedFolderFile(file)) return;
    var key = String(file.path || file.url || file.name || '').toLowerCase();
    var existing = unique[key];
    if (!existing || Number(file.lastModified || 0) >= Number(existing.lastModified || 0)) unique[key] = file;
  });
  return Object.values(unique).sort(function(a, b) { return Number(b.lastModified || 0) - Number(a.lastModified || 0); });
}

function isSharedFolderFile(file) {
  var name = String(file.name || '').toLowerCase();
  var path = String(file.path || '').toLowerCase();
  var combined = name + ' ' + path;
  var ext = '';
  var match = name.match(/\.([^.]+)$/);
  if (match) ext = match[1];
  var allowed = { txt: true, pdf: true, ppt: true, pptx: true, jpg: true, jpeg: true, png: true, doc: true, docx: true };
  if (!allowed[ext]) return false;
  return [
    '/screenshots/',
    'screenshots/latest',
    'security_screenshots',
    'security-screenshots',
    'security/screenshots',
    'login_screen',
    'login-screen',
    'login screenshot',
    'user_detection',
    'user-detection',
    'detection_screen',
    'detection-screen'
  ].every(function(marker) { return combined.indexOf(marker) < 0; });
}

function normalizeFile(file) {
  var name = file.name || file.fileName || file.file_name || 'file';
  var url = file.url || file.fileUrl || file.file_url || '';
  var path = file.path || file.fullPath || file.storage_path || url || name;
  var size = file.size || file.fileSize || file.file_size || 0;
  var modified = file.lastModified || file.uploadTime || file.upload_time || file.uploaded_at || 0;
  var deviceId = file.deviceId || file.device_id || file.device || 'unknown';
  
  if (typeof modified === 'string') {
    var parsed = Date.parse(modified);
    modified = isNaN(parsed) ? 0 : parsed;
  }
  
  return { 
    name: name, 
    path: path, 
    url: url, 
    size: size, 
    lastModified: modified, 
    deviceId: deviceId,
    isDirectory: !!file.isDirectory 
  };
}

function fileActions(file) {
  // Ensure file URL is absolute (not localhost or relative paths)
  var url = file.url || '';
  
  // Handle Supabase URLs (start with https://)
  if (/^https?:\/\//i.test(url)) {
    return '<a class="btn secondary" target="_blank" href="' + DashboardShell.escapeHtml(url) +
      '" title="Preview file">Preview</a><a class="btn success" href="' + DashboardShell.escapeHtml(url) + '" download title="Download file">Download</a>';
  }
  
  // Handle relative paths through backend
  if (url.charAt(0) === '/' || (url && !url.includes('http'))) {
    var encoded = encodeURIComponent(url);
    return '<a class="btn secondary" target="_blank" href="/files/read/' + encoded +
      '" title="Preview file">Preview</a><a class="btn success" href="/files/download/' + encoded + '" title="Download file">Download</a>';
  }
  
  // Handle file path from API response
  var encoded = encodeURIComponent(file.path || url);
  return '<a class="btn secondary" target="_blank" href="/files/read/' + encoded +
    '" title="Preview file">Preview</a><a class="btn success" href="/files/download/' + encoded + '" title="Download file">Download</a>';
}

function renderFiles() {
  var query = String(document.getElementById('searchInput').value || '').toLowerCase();
  var selectedDevice = shell.getDevice();
  
  // Filter by device if one is selected
  var filtered = allFiles;
  if (selectedDevice) {
    filtered = allFiles.filter(function(file) {
      var fileDevice = file.deviceId || file.device_id || '';
      return fileDevice === selectedDevice || fileDevice === '' || !fileDevice;
    });
  }
  
  // Apply search filter
  var rows = dedupe(filtered).filter(function(file) {
    return !query || String(file.name || file.path || '').toLowerCase().indexOf(query) >= 0;
  });
  
  var total = rows.reduce(function(sum, file) { return sum + Number(file.size || 0); }, 0);
  document.getElementById('fileCount').textContent = rows.length;
  document.getElementById('fileSize').textContent = formatBytes(total);
  
  if (!rows.length) {
    var message = selectedDevice ? 
      'No files found for device ' + DashboardShell.escapeHtml(selectedDevice) + '.' :
      'No files found.';
    document.getElementById('fileRows').innerHTML = '<tr><td colspan="5"><div class="empty-state">' + message + '</div></td></tr>';
    return;
  }
  
  document.getElementById('fileRows').innerHTML = rows.map(function(file) {
    file = normalizeFile(file);
    var path = file.path || file.name;
    return '<tr><td><div class="row-title">' + DashboardShell.escapeHtml(file.name || path) +
      '</div><div class="row-sub">' + DashboardShell.escapeHtml(path) +
      '</div></td><td>' + DashboardShell.escapeHtml(file.deviceId || 'unknown') +
      '</td><td>' + formatBytes(file.size) +
      '</td><td>' + (file.lastModified ? DashboardShell.formatDateTime(Number(file.lastModified)) : '--') +
      '</td><td><div style="display:flex;gap:8px;flex-wrap:wrap;">' + fileActions(file) + '</div></td></tr>';
  }).join('');
}

function loadFiles() {
  document.getElementById('fileStatus').textContent = 'Syncing';
  var selectedDevice = shell.getDevice();
  
  // Build API calls based on selected device
  var apiCalls = [];
  
  if (selectedDevice) {
    // If device is selected, fetch files for that specific device
    console.log('Loading files for device:', selectedDevice);
    apiCalls.push(
      fetch('/files/device/' + encodeURIComponent(selectedDevice), { cache: 'no-store' })
        .then(function(r) { 
          console.log('Device-specific file fetch status:', r.status);
          return r.ok ? r.json() : []; 
        })
        .catch(function(err) { 
          console.error('Device-specific file fetch error:', err);
          return []; 
        })
    );
  } else {
    // If no device selected, fetch all files
    console.log('Loading all files');
    apiCalls.push(
      fetch('/files/all', { cache: 'no-store' })
        .then(function(r) { 
          console.log('All files fetch status:', r.status);
          return r.ok ? r.json() : []; 
        })
        .catch(function(err) { 
          console.error('All files fetch error:', err);
          return []; 
        })
    );
  }
  
  Promise.all(apiCalls)
    .then(function(results) {
      allFiles = [].concat(Array.isArray(results[0]) ? results[0] : []);
      console.log('Loaded', allFiles.length, 'files total');
      document.getElementById('fileStatus').textContent = 'Ready';
      renderFiles();
    })
    .catch(function(err) {
      console.error('File loading error:', err);
      document.getElementById('fileStatus').textContent = 'Error';
      document.getElementById('fileRows').innerHTML = '<tr><td colspan="5"><div class="empty-state">Unable to load files: ' + DashboardShell.escapeHtml(err.message) + '</div></td></tr>';
    });
}

// Event listeners
document.getElementById('searchInput').addEventListener('input', renderFiles);

// Reload when device changes or shell refreshes
window.addEventListener('shellrefresh', loadFiles);
window.addEventListener('devicechange', loadFiles);

// Initial load
loadFiles();
</script>
</body>
</html>
