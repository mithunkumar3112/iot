
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0ea5e9">
    <meta name="description" content="IoT Monitor - Access PC from phone, works OFFLINE">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230ea5e9' width='100' height='100'/><text x='50' y='70' font-size='60' fill='white' text-anchor='middle' font-weight='bold'>IOT</text></svg>">
    <title>IoT Monitor Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .install-banner {
            background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
            color: white;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
        }
        .install-banner button {
            background: white;
            color: #0ea5e9;
            border: none;
            padding: 8px 16px;
            border-radius: 3px;
            cursor: pointer;
            font-weight: bold;
            margin-left: 10px;
        }
    </style>
</head>

<body class="dark">

<div class="install-banner" id="installBanner">
    📲 <strong>Install App for Offline Access!</strong> Click below to save to home screen.
    <button onclick="installApp()">Install</button>
</div>

<h1>📊 IoT Monitoring Dashboard</h1>

<div class="menu">

<a href="performance.html"> System Performance</a>

<a href="screen.html"> Screen Monitoring</a>

<a href="history.html"> History</a>

<a href="controls.html"> Controls</a>

<a href="files.html"> File Explorer</a>

<a href="onedrive.html"> OneDrive</a>

</div>
<button onclick="logout()">Logout</button>

<script>
    // ==========================================
    // REGISTER SERVICE WORKER
    // ==========================================
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('service-worker.js')
                .then(reg => console.log('✅ Service Worker registered'))
                .catch(err => console.log('⚠️ SW failed:', err));
        });
    }

    // ==========================================
    // PWA INSTALL PROMPT
    // ==========================================
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('installBanner').style.display = 'block';
    });

    function installApp() {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((choiceResult) => {
                if (choiceResult.outcome === 'accepted') {
                    console.log('✅ App installed!');
                    document.getElementById('installBanner').style.display = 'none';
                }
                deferredPrompt = null;
            });
        }
    }

    // ==========================================
    // LOGOUT
    // ==========================================
    function logout() {
        if (confirm('Logout?')) {
            localStorage.removeItem('token');
            window.location = 'login.html';
        }
    }
</script>

</body>
</html>
