<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="dashboard-shell.css">
</head>
<body>
<template id="pageTemplate">
  <div id="overviewView">
    <div class="grid cols-4" style="margin-bottom:18px;">
      <div class="card card-pad"><div class="metric-label">CPU usage</div><div class="metric-value" id="cpuVal">--%</div><div class="bar"><span id="cpuBar" style="width:0%"></span></div></div>
      <div class="card card-pad"><div class="metric-label">RAM usage</div><div class="metric-value" id="ramVal">--%</div><div class="bar yellow"><span id="ramBar" style="width:0%"></span></div></div>
      <div class="card card-pad"><div class="metric-label">Battery</div><div class="metric-value" id="batteryVal">--%</div><div class="bar green"><span id="batteryBar" style="width:0%"></span></div></div>
      <div class="card card-pad"><div class="metric-label">Uptime</div><div class="metric-value" id="uptimeVal">--</div></div>
    </div>
    <div class="grid cols-2">
      <div class="card">
        <div class="card-head"><div><div class="card-title">Top User Apps</div><div class="muted">Filtered live process feed</div></div><a class="btn secondary" href="processes.html">View All</a></div>
        <div class="table-wrap"><table class="table"><thead><tr><th>App</th><th>CPU</th><th>Status</th></tr></thead><tbody id="processRows"><tr><td colspan="3"><div class="empty-state">Waiting for processes...</div></td></tr></tbody></table></div>
      </div>
      <div class="card">
        <div class="card-head"><div><div class="card-title">Recent Alerts</div><div class="muted">Security and monitoring alerts</div></div><a class="btn secondary" href="security-alerts.html">Security</a></div>
        <div class="table-wrap"><table class="table"><thead><tr><th>Alert</th><th>Time</th><th>Level</th></tr></thead><tbody id="alertRows"><tr><td colspan="3"><div class="empty-state">No alerts yet.</div></td></tr></tbody></table></div>
      </div>
    </div>
  </div>
  <div id="commandsView" style="display:none;">
    <div class="card">
      <div class="card-head"><div><div class="card-title">Device Commands</div><div class="muted">Commands are queued for the selected device.</div></div></div>
      <div class="card-pad">
        <div class="grid cols-4">
          <button class="btn danger" data-command="SHUTDOWN">Shutdown</button>
          <button class="btn secondary" data-command="RESTART">Restart</button>
          <button class="btn secondary" data-command="SLEEP">Sleep</button>
          <button class="btn secondary" data-command="LOCK">Lock</button>
        </div>
        <div class="empty-state" id="commandStatus" style="margin-top:18px;">No command sent this session.</div>
      </div>
    </div>
  </div>
</template>
<script src="dashboard-shell.js"></script>
<script>
var content = document.getElementById('pageTemplate').content.cloneNode(true);
var shell = DashboardShell.init({
  active: location.hash === '#commands' ? 'commands' : 'dashboard',
  title: 'Dashboard',
  subtitle: 'Live laptop monitoring and command center.',
  content: content,
  actions: '<button class="btn secondary" id="switchCommandsBtn">Commands</button>'
});
var alerts = [];
var processes = [];
function pct(value) { return Math.min(100, Math.max(0, Math.round(Number(value || 0)))); }
function renderMetrics(data) {
  var cpu = pct(data.cpu), ram = pct(data.ram), battery = data.battery == null ? null : pct(data.battery);
  document.getElementById('cpuVal').textContent = cpu + '%'; document.getElementById('cpuBar').style.width = cpu + '%';
  document.getElementById('ramVal').textContent = ram + '%'; document.getElementById('ramBar').style.width = ram + '%';
  document.getElementById('batteryVal').textContent = battery == null ? '--%' : battery + '%'; document.getElementById('batteryBar').style.width = (battery || 0) + '%';
  var up = Number(data.uptime || 0); document.getElementById('uptimeVal').textContent = up ? Math.floor(up / 3600) + 'h ' + Math.floor((up % 3600) / 60) + 'm' : '--';
  if (data.deviceId) { DashboardShell.setDevice(data.deviceId); shell.setStatus('Live', true); }
}
function renderProcesses() {
  var rows = processes.slice(0, 8);
  document.getElementById('processRows').innerHTML = rows.length ? rows.map(function(p) {
    var cpu = pct(p.cpu || p.cpuUsage);
    return '<tr><td><div class="row-title">' + DashboardShell.escapeHtml(p.name || p.processName || 'Unknown') + '</div></td><td>' + cpu + '%</td><td><span class="badge badge-running">OPEN</span></td></tr>';
  }).join('') : '<tr><td colspan="3"><div class="empty-state">Waiting for processes...</div></td></tr>';
}
function renderAlerts() {
  document.getElementById('alertRows').innerHTML = alerts.length ? alerts.slice(0, 8).map(function(a) {
    return '<tr><td><div class="row-title">' + DashboardShell.escapeHtml(a.message || a.type || 'Alert') +
      '</div><div class="row-sub">' + DashboardShell.escapeHtml(a.deviceId || '') + '</div></td><td>' + DashboardShell.formatTime(a.timestamp) +
      '</td><td><span class="badge ' + ((a.severity === 'HIGH' || a.severity === 'CRITICAL') ? 'badge-danger' : 'badge-warning') + '">' + DashboardShell.escapeHtml(a.severity || 'WARN') + '</span></td></tr>';
  }).join('') : '<tr><td colspan="3"><div class="empty-state">No alerts yet.</div></td></tr>';
}
function loadMetrics() {
  fetch('/metrics/latest').then(function(r){ return r.ok ? r.json() : {}; }).then(renderMetrics).catch(function(){ shell.setStatus('Waiting', false); });
  var device = shell.getDevice();
  if (device) fetch('/processes/latest?deviceId=' + encodeURIComponent(device) + '&limit=20').then(function(r){ return r.ok ? r.json() : []; }).then(function(rows){ processes = Array.isArray(rows) ? rows : []; renderProcesses(); });
  fetch('/security/alerts' + (device ? '?deviceId=' + encodeURIComponent(device) : '')).then(function(r){ return r.ok ? r.json() : []; }).then(function(rows){ alerts = Array.isArray(rows) ? rows : []; renderAlerts(); });
}
function sendCommand(command) {
  var device = shell.getDevice();
  if (!device) { DashboardShell.toast('Command', 'Select a device first', 'danger'); return; }
  fetch('/commands/send', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ deviceId: device, command: command }) })
    .then(function(r){ return r.json(); }).then(function(data){
      document.getElementById('commandStatus').textContent = data.error ? command + ' failed: ' + data.error : command + ' queued for ' + device;
      DashboardShell.toast('Command', command + ' queued for ' + device, data.error ? 'danger' : 'success');
    }).catch(function(){ DashboardShell.toast('Command', command + ' failed', 'danger'); });
}
function showCommands(show) {
  document.getElementById('overviewView').style.display = show ? 'none' : '';
  document.getElementById('commandsView').style.display = show ? '' : 'none';
}
document.getElementById('switchCommandsBtn').addEventListener('click', function(){ location.hash = location.hash === '#commands' ? '' : '#commands'; showCommands(location.hash === '#commands'); });
document.querySelectorAll('[data-command]').forEach(function(btn){ btn.addEventListener('click', function(){ sendCommand(btn.dataset.command); }); });
DashboardShell.connectStomp(['/topic/processes','/topic/security-alerts','/topic/alerts','/topic/commands','/topic/battery'], function(payload) {
  if (payload.deviceId && Array.isArray(payload.processes)) { if (!shell.getDevice() || payload.deviceId === shell.getDevice()) { processes = payload.processes; renderProcesses(); } }
  else if (payload.event === 'security_alert' || payload.message || payload.severity) { var alert = payload.data || payload; alerts.unshift(alert); renderAlerts(); DashboardShell.toast('Security alert', alert.message || alert.type || 'Alert', 'danger'); }
  else if (payload.type === 'BATTERY_UPDATE' && payload.data) { renderMetrics(payload.data); }
});
window.addEventListener('devicechange', loadMetrics);
window.addEventListener('shellrefresh', loadMetrics);
showCommands(location.hash === '#commands');
loadMetrics();
setInterval(loadMetrics, 5000);
</script>
</body>
</html>
