<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Access PC files from phone, works OFFLINE">
    <meta name="theme-color" content="#0ea5e9">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230ea5e9' width='100' height='100'/><text x='50' y='70' font-size='60' fill='white' text-anchor='middle' font-weight='bold'>F</text></svg>">
    <title>File Explorer - Offline Ready</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .offline-banner {
            background: #ff6b6b;
            color: white;
            padding: 12px;
            text-align: center;
            display: none;
            font-weight: bold;
            border-radius: 4px;
            margin-bottom: 10px;
        }
        .online-banner {
            background: #51cf66;
            color: white;
            padding: 12px;
            text-align: center;
            display: none;
            font-weight: bold;
            border-radius: 4px;
            margin-bottom: 10px;
        }
        .sync-status {
            padding: 10px;
            text-align: center;
            font-size: 14px;
            color: #0ea5e9;
            background: #222;
            border-radius: 4px;
            margin-bottom: 10px;
        }
        .action-buttons {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .action-buttons button {
            flex: 1;
            min-width: 120px;
            padding: 10px;
            background: #0ea5e9;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .action-buttons button:active {
            background: #0284c7;
        }
        .clear-btn {
            background: #d32f2f !important;
        }
        .clear-btn:active {
            background: #b71c1c !important;
        }
    </style>
</head>
<body class="dark">
    <div class="offline-banner" id="offlineBanner">🔴 OFFLINE MODE - Using cached files</div>
    <div class="online-banner" id="onlineBanner">🟢 ONLINE - Connected to PC</div>

    <h1>📂 Laptop File Explorer</h1>
    <a href="dashboard.html" class="backButton">← Back</a>

    <div class="container">
        <div class="sync-status" id="syncStatus">Initializing...</div>
        <div class="action-buttons">
            <button id="syncBtn">🔄 Sync Files</button>
            <button id="installBtn" style="display: none;">📲 Install App</button>
            <button class="clear-btn" id="clearBtn">🗑️ Clear Cache</button>
        </div>
        <div id="files"></div>
    </div>

    <script>
        // ==========================================
        // FUNCTION DEFINITIONS (MUST BE FIRST)
        // ==========================================
        function syncNow() {
            syncStatus.innerText = "🔄 Syncing files...";
            loadFiles();
        }

        async function clearCache() {
            if (confirm('⚠️ Clear ALL cached files? You can re-cache anytime.')) {
                try {
                    const db = await openDB();
                    const transaction = db.transaction(['files'], 'readwrite');
                    const store = transaction.objectStore('files');
                    store.clear();
                    syncStatus.innerText = "✅ Cache cleared";
                    setTimeout(() => loadFiles(), 500);
                } catch (err) {
                    syncStatus.innerText = `❌ Clear failed: ${err.message}`;
                }
            }
        }

        function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(() => {
                    deferredPrompt = null;
                    document.getElementById('installBtn').style.display = 'none';
                });
            }
        }

        // ==========================================
        // REGISTER SERVICE WORKER FOR OFFLINE
        // ==========================================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(reg => {
                        console.log('✅ Service Worker registered');
                        checkOnlineStatus();
                    })
                    .catch(err => console.log('⚠️ SW registration failed:', err));
            });
        }

        // PWA Install Prompt
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBtn').style.display = 'inline-block';
        });

        // Online/Offline status
        function checkOnlineStatus() {
            const isOnline = navigator.onLine;
            const offlineBanner = document.getElementById('offlineBanner');
            const onlineBanner = document.getElementById('onlineBanner');
            
            if (isOnline) {
                onlineBanner.style.display = 'block';
                offlineBanner.style.display = 'none';
                syncNow();
            } else {
                offlineBanner.style.display = 'block';
                onlineBanner.style.display = 'none';
                showCachedFiles();
            }
        }

        window.addEventListener('online', checkOnlineStatus);
        window.addEventListener('offline', checkOnlineStatus);

        // ==========================================
        // INDEXEDDB FUNCTIONS
        // ==========================================
        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('IoTMonitor', 1);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => resolve(request.result);
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains('files')) {
                        db.createObjectStore('files', { keyPath: 'path' });
                    }
                };
            });
        }

        async function cacheFile(path, blob) {
            try {
                const arrayBuffer = await blob.arrayBuffer();
                const db = await openDB();
                const transaction = db.transaction(['files'], 'readwrite');
                const store = transaction.objectStore('files');
                return new Promise((resolve, reject) => {
                    const request = store.put({
                        path: path,
                        blob: blob,
                        size: blob.size,
                        cachedAt: new Date().toISOString()
                    });
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => resolve();
                });
            } catch (err) {
                console.error('Cache error:', err);
            }
        }

        async function getCachedFile(path) {
            try {
                const db = await openDB();
                const transaction = db.transaction(['files'], 'readonly');
                const store = transaction.objectStore('files');
                return new Promise((resolve, reject) => {
                    const request = store.get(path);
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => resolve(request.result);
                });
            } catch (err) {
                return null;
            }
        }

        async function getAllCachedFiles() {
            try {
                const db = await openDB();
                const transaction = db.transaction(['files'], 'readonly');
                const store = transaction.objectStore('files');
                return new Promise((resolve, reject) => {
                    const request = store.getAll();
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => resolve(request.result || []);
                });
            } catch (err) {
                return [];
            }
        }

        // ==========================================
        // AUTH HELPER
        // ==========================================
        function authFetch(url, options = {}) {
            const token = localStorage.getItem("token");
            options.headers = {
                ...(options.headers || {}),
                "Authorization": "Bearer " + token
            };
            return fetch(url, options);
        }

        // ==========================================
        // FILE LOADING
        // ==========================================
        const filesContainer = document.getElementById("files");
        const syncStatus = document.getElementById("syncStatus");

        async function loadFiles() {
            try {
                syncStatus.innerText = "📡 Fetching files from PC...";
                
                const res = await authFetch("/files/list", { 
                    method: "GET",
                    cache: "no-store"
                });
                if (!res.ok) throw new Error(`HTTP ${res.status}: Failed to fetch files`);
                
                const allFiles = await res.json();
                
                // Filter to show only files (not directories)
                const files = allFiles.filter(f => !f.isDirectory);
                
                filesContainer.innerHTML = "";

                if (!files || files.length === 0) {
                    const noFilesMsg = "No files found on PC. Configure file paths in backend config.";
                    filesContainer.innerHTML = "<p style='color:#888;text-align:center;padding:20px;'>" + noFilesMsg + "</p>";
                    syncStatus.innerText = "⚠️ No files available";
                    return;
                }

                for (const file of files) {
                    const fileDiv = document.createElement("div");
                    fileDiv.className = "file-item";
                    fileDiv.style.cssText = "padding: 12px; background: #2a2a2a; margin: 8px 0; border-radius: 4px; display: flex; justify-content: space-between; align-items: center;";
                    
                    const fileSize = file.size > 1024 * 1024 
                        ? (file.size / (1024 * 1024)).toFixed(2) + " MB"
                        : (file.size / 1024).toFixed(2) + " KB";

                    fileDiv.innerHTML = `
                        <div style="flex: 1;">
                            <div style="font-weight: bold;">📄 ${file.name}</div>
                            <div style="color: #888; font-size: 12px;">${fileSize}</div>
                        </div>
                        <div style="display: flex; gap: 8px;">
                            <button style="padding: 6px 12px; background: #0ea5e9; color: white; border: none; border-radius: 3px; cursor: pointer; font-size: 12px;" class="cache-btn" data-path="${file.path}" data-name="${file.name}">💾 Cache</button>
                            <button style="padding: 6px 12px; background: #4CAF50; color: white; border: none; border-radius: 3px; cursor: pointer; font-size: 12px;" class="download-btn" data-path="${file.path}">📥 Download</button>
                        </div>
                    `;
                    
                    // Add event listeners to avoid quote escaping issues
                    const cacheBtn = fileDiv.querySelector('.cache-btn');
                    const downloadBtn = fileDiv.querySelector('.download-btn');
                    cacheBtn.addEventListener('click', () => {
                        downloadAndCache(cacheBtn.dataset.name, cacheBtn.dataset.path);
                    });
                    downloadBtn.addEventListener('click', () => {
                        downloadFile(downloadBtn.dataset.path);
                    });
                    filesContainer.appendChild(fileDiv);
                }

                const message = files.length > 0 
                    ? `✅ ${files.length} files ready - Click Cache button to save for offline`
                    : "✅ No files available";
                syncStatus.innerText = message;
            } catch (err) {
                console.error("Error loading files:", err);
                syncStatus.innerText = `⚠️ Error: ${err.message} - Click "Sync Files" to retry`;
                
                // Fallback to cached
                setTimeout(() => {
                    if (navigator.onLine) {
                        syncStatus.innerText = "🔄 Retrying in 5 seconds...";
                        setTimeout(loadFiles, 5000);
                    } else {
                        showCachedFiles();
                    }
                }, 1000);
            }
        }

        async function showCachedFiles() {
            const cachedFiles = await getAllCachedFiles();
            filesContainer.innerHTML = "";

            if (cachedFiles.length === 0) {
                filesContainer.innerHTML = "<p style='color: #888; text-align: center; padding: 20px;'>No cached files. Connect to PC and use Cache button to save files for offline.</p>";
                return;
            }

            for (const file of cachedFiles) {
                const fileDiv = document.createElement("div");
                fileDiv.className = "file-item";
                fileDiv.style.cssText = "padding: 12px; background: #1a1a1a; margin: 8px 0; border: 1px solid #333; border-radius: 4px; display: flex; justify-content: space-between; align-items: center;";
                
                const fileSize = file.size > 1024 * 1024 
                    ? (file.size / (1024 * 1024)).toFixed(2) + " MB"
                    : (file.size / 1024).toFixed(2) + " KB";

                const cachedDate = new Date(file.cachedAt).toLocaleDateString();

                fileDiv.innerHTML = `
                    <div style="flex: 1;">
                        <div style="font-weight: bold; color: #51cf66;">💾 ${file.path}</div>
                        <div style="color: #888; font-size: 12px;">${fileSize} - Cached: ${cachedDate}</div>
                    </div>
                    <button style="padding: 6px 12px; background: #51cf66; color: black; border: none; border-radius: 3px; cursor: pointer; font-size: 12px;" class="open-cached-btn" data-path="${file.path}">💾 Open</button>
                `;
                
                const openBtn = fileDiv.querySelector('.open-cached-btn');
                openBtn.addEventListener('click', () => {
                    downloadCachedFile(openBtn.dataset.path);
                });
                filesContainer.appendChild(fileDiv);
            }

            syncStatus.innerText = `📦 Showing ${cachedFiles.length} cached files (OFFLINE MODE)`;
        }

        async function downloadAndCache(fileName, filePath) {
            try {
                syncStatus.innerText = `💾 Caching "${fileName}"...`;
                
                const res = await authFetch(`/files/download/${encodeURIComponent(filePath)}`);
                if (!res.ok) throw new Error('Download failed');
                
                const blob = await res.blob();
                await cacheFile(filePath, blob);
                
                syncStatus.innerText = `✅ Cached! "${fileName}" available offline`;
                setTimeout(loadFiles, 1000);
            } catch (err) {
                syncStatus.innerText = `❌ Cache failed: ${err.message}`;
            }
        }

        async function downloadFile(filePath) {
            // Try to use the locally cached version first (works offline)
            const cached = await getCachedFile(filePath);
            if (cached) {
                downloadBlob(cached.blob, filePath);
                syncStatus.innerText = `✅ Downloaded cached file`;
                return;
            }

            // If not cached, download from the PC and cache it for future offline use
            try {
                syncStatus.innerText = `📥 Downloading "${filePath}"...`;
                const res = await authFetch(`/files/download/${encodeURIComponent(filePath)}`);
                if (!res.ok) throw new Error(`HTTP ${res.status}: Failed to download`);
                const blob = await res.blob();
                await cacheFile(filePath, blob);
                downloadBlob(blob, filePath);
                syncStatus.innerText = `✅ Downloaded and cached file`;
            } catch (err) {
                syncStatus.innerText = `❌ Download failed: ${err.message}`;
            }
        }

        function downloadBlob(blob, filePath) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filePath.split('/').pop();
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        async function downloadCachedFile(path) {
            try {
                const file = await getCachedFile(path);
                if (!file) {
                    syncStatus.innerText = "❌ File not found in cache";
                    return;
                }
                
                const url = URL.createObjectURL(file.blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = path.split('/').pop();
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                syncStatus.innerText = "✅ Downloaded cached file";
            } catch (err) {
                syncStatus.innerText = `❌ Error: ${err.message}`;
            }
        }

        // ==========================================
        // SETUP EVENT LISTENERS WHEN DOM IS READY
        // ==========================================
        window.addEventListener('DOMContentLoaded', () => {
            // Attach event listeners to buttons
            document.getElementById('syncBtn').addEventListener('click', syncNow);
            document.getElementById('clearBtn').addEventListener('click', clearCache);
            document.getElementById('installBtn').addEventListener('click', installApp);

            // Load files on page load
            checkOnlineStatus();
        });
    </script>
</body>
</html>
