<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Access PC files from phone, works OFFLINE">
    <meta name="theme-color" content="#0ea5e9">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230ea5e9' width='100' height='100'/><text x='50' y='70' font-size='60' fill='white' text-anchor='middle' font-weight='bold'>F</text></svg>">
    <title>File Explorer</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .offline-banner {
            background: #ff6b6b;
            color: white;
            padding: 10px;
            text-align: center;
            display: none;
            font-weight: bold;
        }
        .online-banner {
            background: #51cf66;
            color: white;
            padding: 10px;
            text-align: center;
            display: none;
            font-weight: bold;
        }
        .sync-status {
            padding: 10px;
            text-align: center;
            font-size: 12px;
            color: #888;
        }
        .file-item {
            padding: 12px;
            background: #2a2a2a;
            margin: 8px 0;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .file-name { flex: 1; }
        .file-size { color: #888; font-size: 12px; margin-right: 10px; }
        .file-sync-status {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 3px;
            background: #444;
            color: #ddd;
        }
        .file-sync-status.cached {
            background: #2e7d32;
            color: #a5d6a7;
        }
        .file-sync-status.synced {
            background: #1976d2;
            color: #90caf9;
        }
        .file-sync-status.pending {
            background: #f57c00;
            color: #ffe0b2;
        }
        .action-btn {
            padding: 6px 12px;
            margin-left: 8px;
            background: #0ea5e9;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 11px;
        }
        .action-btn:active {
            background: #0284c7;
        }
    </style>
</head>
<body class="dark">
    <div class="offline-banner" id="offlineBanner">🔴 OFFLINE MODE - Using cached files</div>
    <div class="online-banner" id="onlineBanner">🟢 ONLINE - Syncing files</div>

    <h1>📂 Laptop File Explorer</h1>
    <a href="dashboard.html" class="backButton">← Back</a>

    <div class="container">
        <div class="sync-status" id="syncStatus">Loading...</div>
        <button onclick="syncNow()" style="width: 100%; padding: 10px; margin-bottom: 10px;">🔄 Sync Now</button>
        <button onclick="clearCache()" style="width: 100%; padding: 10px; margin-bottom: 10px; background: #d32f2f;">🗑️ Clear Cache</button>
        <div id="files"></div>
    </div>

    <script>
        // ==========================================
        // REGISTER SERVICE WORKER FOR OFFLINE
        // ==========================================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(reg => {
                        console.log('✅ Service Worker registered');
                        checkOnlineStatus();
                    })
                    .catch(err => console.log('SW registration failed:', err));
            });
        }

        // Online/Offline status
        function checkOnlineStatus() {
            const isOnline = navigator.onLine;
            const offlineBanner = document.getElementById('offlineBanner');
            const onlineBanner = document.getElementById('onlineBanner');
            
            if (isOnline) {
                onlineBanner.style.display = 'block';
                offlineBanner.style.display = 'none';
            } else {
                offlineBanner.style.display = 'block';
                onlineBanner.style.display = 'none';
            }
        }

        window.addEventListener('online', checkOnlineStatus);
        window.addEventListener('offline', checkOnlineStatus);

        // ==========================================
        // INDEXEDDB FUNCTIONS
        // ==========================================
        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('IoTMonitor', 1);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => resolve(request.result);
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains('files')) {
                        db.createObjectStore('files', { keyPath: 'path' });
                    }
                };
            });
        }

        async function cacheFile(path, content, size) {
            try {
                const db = await openDB();
                const transaction = db.transaction(['files'], 'readwrite');
                const store = transaction.objectStore('files');
                await new Promise((resolve, reject) => {
                    const request = store.put({
                        path: path,
                        content: content,
                        size: size,
                        cachedAt: new Date().toISOString(),
                        synced: true
                    });
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => resolve();
                });
            } catch (err) {
                console.error('Cache error:', err);
            }
        }

        async function getCachedFile(path) {
            try {
                const db = await openDB();
                const transaction = db.transaction(['files'], 'readonly');
                const store = transaction.objectStore('files');
                return new Promise((resolve, reject) => {
                    const request = store.get(path);
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => resolve(request.result);
                });
            } catch (err) {
                return null;
            }
        }

        async function getAllCachedFiles() {
            try {
                const db = await openDB();
                const transaction = db.transaction(['files'], 'readonly');
                const store = transaction.objectStore('files');
                return new Promise((resolve, reject) => {
                    const request = store.getAll();
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => resolve(request.result || []);
                });
            } catch (err) {
                return [];
            }
        }

        // ==========================================
        // AUTH HELPER
        // ==========================================
        function authFetch(url, options = {}) {
            const token = localStorage.getItem("token");
            options.headers = {
                ...(options.headers || {}),
                "Authorization": "Bearer " + token
            };
            return fetch(url, options);
        }

        // ==========================================
        // FILE LOADING
        // ==========================================
        const filesContainer = document.getElementById("files");
        const syncStatus = document.getElementById("syncStatus");

        async function loadFiles() {
            try {
                syncStatus.innerText = "📡 Fetching from PC...";
                
                const res = await authFetch("/files/list");
                if (!res.ok) throw new Error('Failed to fetch files');
                
                const files = await res.json();
                filesContainer.innerHTML = "";

                for (const file of files) {
                    const fileDiv = document.createElement("div");
                    fileDiv.className = "file-item";
                    
                    const fileSize = file.size > 1024 * 1024 
                        ? (file.size / (1024 * 1024)).toFixed(2) + " MB"
                        : (file.size / 1024).toFixed(2) + " KB";

                    fileDiv.innerHTML = `
                        <div class="file-name">📄 ${file.name}</div>
                        <div class="file-size">${fileSize}</div>
                        <div class="file-sync-status synced">✓ Online</div>
                        <button class="action-btn" onclick="downloadAndCache('${file.name}', '${file.path}')">⬇️ Cache</button>
                        <button class="action-btn" onclick="downloadFile('${file.path}')">📥 Download</button>
                    `;
                    filesContainer.appendChild(fileDiv);
                }

                syncStatus.innerText = `✅ Loaded ${files.length} files from PC`;
            } catch (err) {
                console.error("Error loading files:", err);
                syncStatus.innerText = "⚠️ Offline: Showing cached files";
                showCachedFiles();
            }
        }

        async function showCachedFiles() {
            const cachedFiles = await getAllCachedFiles();
            filesContainer.innerHTML = "";

            if (cachedFiles.length === 0) {
                filesContainer.innerHTML = "<p style='color: #888;'>No cached files. Connect to PC to cache files.</p>";
                return;
            }

            for (const file of cachedFiles) {
                const fileDiv = document.createElement("div");
                fileDiv.className = "file-item";
                
                const fileSize = file.size > 1024 * 1024 
                    ? (file.size / (1024 * 1024)).toFixed(2) + " MB"
                    : (file.size / 1024).toFixed(2) + " KB";

                const cachedDate = new Date(file.cachedAt).toLocaleDateString();

                fileDiv.innerHTML = `
                    <div class="file-name">📄 ${file.path}</div>
                    <div class="file-size">${fileSize} (${cachedDate})</div>
                    <div class="file-sync-status cached">💾 Cached</div>
                    <button class="action-btn" onclick="downloadCachedFile('${file.path}')">💾 View</button>
                `;
                filesContainer.appendChild(fileDiv);
            }

            syncStatus.innerText = `📦 Showing ${cachedFiles.length} cached files`;
        }

        async function downloadAndCache(fileName, filePath) {
            try {
                syncStatus.innerText = `⬇️ Caching ${fileName}...`;
                
                const res = await authFetch(`/files/download/${filePath}`);
                if (!res.ok) throw new Error('Download failed');
                
                const blob = await res.blob();
                const content = await blob.arrayBuffer();
                
                await cacheFile(filePath, content, blob.size);
                syncStatus.innerText = `✅ Cached ${fileName}`;
                
                setTimeout(loadFiles, 1000);
            } catch (err) {
                syncStatus.innerText = `❌ Cache failed: ${err.message}`;
            }
        }

        function downloadFile(filePath) {
            const token = localStorage.getItem("token");
            const url = `/files/download/${filePath}?token=${token}`;
            window.location.href = url;
        }

        async function downloadCachedFile(path) {
            try {
                const file = await getCachedFile(path);
                if (!file) {
                    syncStatus.innerText = "❌ File not found in cache";
                    return;
                }
                
                const blob = new Blob([file.content]);
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = path.split('/').pop();
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            } catch (err) {
                syncStatus.innerText = `❌ Error: ${err.message}`;
            }
        }

        async function syncNow() {
            syncStatus.innerText = "🔄 Syncing...";
            loadFiles();
        }

        async function clearCache() {
            if (confirm('Clear all cached files? (You can re-cache anytime)')) {
                try {
                    const db = await openDB();
                    const transaction = db.transaction(['files'], 'readwrite');
                    const store = transaction.objectStore('files');
                    store.clear();
                    syncStatus.innerText = "✅ Cache cleared";
                    setTimeout(() => loadFiles(), 500);
                } catch (err) {
                    syncStatus.innerText = `❌ Clear failed: ${err.message}`;
                }
            }
        }

        // Load files on page load
        checkOnlineStatus();
        loadFiles();
    </script>
</body>
</html>
