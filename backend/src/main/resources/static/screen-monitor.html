<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screen Monitoring</title>
  <link rel="stylesheet" href="dashboard-shell.css">
  <style>
    .screen-frame { min-height: 420px; display: grid; place-items: center; background: #020617; border-radius: 8px; border: 1px solid var(--border); overflow: hidden; }
    .screen-frame img { max-width: 100%; max-height: 70vh; display: block; }
  </style>
</head>
<body>
<template id="pageTemplate">
  <div class="grid cols-4" style="margin-bottom:18px;">
    <div class="card card-pad"><div class="metric-label">Status</div><div class="metric-value" id="screenStatus">--</div></div>
    <div class="card card-pad"><div class="metric-label">Last Captured</div><div class="metric-value" id="lastCapture">--</div></div>
    <div class="card card-pad"><div class="metric-label">Auto Refresh</div><div class="metric-value" id="autoState">ON</div></div>
    <div class="card card-pad"><div class="metric-label">Device</div><div class="metric-value" id="deviceName">--</div></div>
  </div>
  <div class="card">
    <div class="card-head">
      <div><div class="card-title">Live Screen Preview</div><div class="muted">Latest screenshot from the laptop agent.</div></div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;"><button class="btn" id="captureBtn">Capture Now</button><button class="btn secondary" id="autoBtn">Pause Auto</button><button class="btn secondary" id="downloadBtn">Download</button></div>
    </div>
    <div class="card-pad"><div class="screen-frame" id="screenFrame"><div class="empty-state">Select a device to view screenshots.</div></div></div>
  </div>
</template>
<script src="dashboard-shell.js"></script>
<script>
var content = document.getElementById('pageTemplate').content.cloneNode(true);
var shell = DashboardShell.init({ active: 'screen', title: 'Screen Monitoring', subtitle: 'Real-time screen capture with command-triggered refresh.', content: content });
var autoRefresh = true;
var intervalId = null;
var currentImageUrl = '';

function setStatus(text, online) {
  document.getElementById('screenStatus').textContent = text;
  shell.setStatus(text, online);
}

function loadDevices() {
  fetch('/processes/devices')
    .then(function(r) { return r.ok ? r.json() : []; })
    .then(function(devices) {
      shell.setDevices(Array.isArray(devices) ? devices : []);
      if (!shell.getDevice() && devices && devices.length) DashboardShell.setDevice(devices[0]);
      loadScreenshot();
    })
    .catch(loadScreenshot);
}

function renderEmpty(message, statusText) {
  currentImageUrl = '';
  document.getElementById('screenFrame').innerHTML = '<div class="empty-state">' + DashboardShell.escapeHtml(message) + '</div>';
  document.getElementById('lastCapture').textContent = '--';
  setStatus(statusText || 'Waiting', false);
}

function loadScreenshot() {
  var device = shell.getDevice();
  document.getElementById('deviceName').textContent = device || '--';
  if (!device) {
    renderEmpty('Select a device to view screenshots.', 'No Device');
    return;
  }
  fetch('/api/screenshots/latest?deviceId=' + encodeURIComponent(device) + '&t=' + Date.now())
    .then(function(r) { return r.ok ? r.json() : null; })
    .then(function(data) {
      if (!data || !data.imageUrl) {
        renderEmpty(data && data.message ? data.message : 'No screenshot uploaded yet.', 'Waiting');
        return;
      }
      currentImageUrl = data.imageUrl;
      document.getElementById('screenFrame').innerHTML = '<img src="' + DashboardShell.escapeHtml(data.imageUrl) + '" alt="Live screen">';
      document.getElementById('lastCapture').textContent = DashboardShell.formatTime(new Date());
      setStatus('Online', true);
    })
    .catch(function() {
      renderEmpty('Unable to load screenshot. Check agent and Supabase upload logs.', 'Offline');
    });
}

function captureNow() {
  var device = shell.getDevice();
  if (!device) { DashboardShell.toast('Screen capture', 'Select a device first', 'danger'); return; }
  fetch('/commands/send', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ deviceId: device, command: 'TAKE_SCREENSHOT' }) })
    .then(function(r) { if (!r.ok) throw new Error('Command failed'); return r.json(); })
    .then(function() { DashboardShell.toast('Screen capture', 'Capture command queued', 'success'); setTimeout(loadScreenshot, 1800); })
    .catch(function() { DashboardShell.toast('Screen capture', 'Capture command failed', 'danger'); });
}

function toggleAuto() {
  autoRefresh = !autoRefresh;
  document.getElementById('autoState').textContent = autoRefresh ? 'ON' : 'OFF';
  document.getElementById('autoBtn').textContent = autoRefresh ? 'Pause Auto' : 'Resume Auto';
  if (autoRefresh) startAuto(); else stopAuto();
}

function startAuto() { if (!intervalId) intervalId = setInterval(loadScreenshot, 5000); }
function stopAuto() { if (intervalId) clearInterval(intervalId); intervalId = null; }

document.getElementById('captureBtn').addEventListener('click', captureNow);
document.getElementById('autoBtn').addEventListener('click', toggleAuto);
document.getElementById('downloadBtn').addEventListener('click', function() {
  if (!currentImageUrl) { DashboardShell.toast('Download', 'No screenshot is available', 'danger'); return; }
  var a = document.createElement('a');
  a.href = currentImageUrl;
  a.download = 'screenshot-' + (shell.getDevice() || 'device') + '.png';
  a.click();
});

DashboardShell.connectStomp(['/topic/screenshots'], function(payload) {
  if (!payload || payload.type !== 'SCREENSHOT_UPDATED' || payload.deviceId !== shell.getDevice()) return;
  currentImageUrl = payload.imageUrl || currentImageUrl;
  loadScreenshot();
  DashboardShell.toast('Screenshot updated', payload.deviceId, 'success');
});
window.addEventListener('devicechange', loadScreenshot);
window.addEventListener('shellrefresh', loadDevices);
loadDevices();
startAuto();
</script>
</body>
</html>
