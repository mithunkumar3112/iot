# ==============================
# SERVER CONFIG
# ==============================
# Use dynamic port for cloud deployment (Render, Heroku, etc)
server.port=${PORT:5000}

# ==============================
# APP CONFIG
# ==============================
app.owner.email=cs22094@velammalitech.edu.in
app.discovery.udp.port=45678

# ==============================
# JWT CONFIG (APP AUTH)
# ==============================
jwt.secret=MyVerySecretKey123456789
jwt.expiration=86400000

# ==============================
# DATABASE (H2 - DEVELOPMENT)
# ==============================
spring.datasource.url=jdbc:h2:mem:iot_monitor;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true

# ==============================
# CONNECTION POOL (HIKARI)
# ==============================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.leak-detection-threshold=60000

# ==============================
# JPA / HIBERNATE
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.open-in-view=false

# ==============================
# LOGGING CONFIG
# ==============================
# Enable detailed logging for file upload flow debugging
logging.level.com.iotmonitor=DEBUG
logging.level.com.iotmonitor.controller.AgentFileUploadController=DEBUG
logging.level.com.iotmonitor.controller.FileMetadataController=DEBUG
logging.level.com.iotmonitor.service.SupabaseStorageService=DEBUG
logging.level.org.springframework.web=INFO

# ==============================
# SUPABASE CONFIG
# ==============================
# Use environment variables for credentials (never hardcode in production!)
# Example: SUPABASE_URL=https://xyz.supabase.co
# Example: SUPABASE_SERVICE_ROLE_KEY=your-service-role-key
# Example: SUPABASE_SERVICE_KEY=your-service-role-key (alias for backward compatibility)
# Example: SUPABASE_BUCKET_NAME=monitor-files

supabase.url=${SUPABASE_URL:}
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY:${SUPABASE_SERVICE_KEY:}}
supabase.key=${SUPABASE_KEY:}
supabase.bucket.name=${SUPABASE_BUCKET_NAME:files}
supabase.bucket=${SUPABASE_BUCKET:monitor-files}
supabase.public-url-base=${SUPABASE_PUBLIC_URL_BASE:}
supabase.storage.url=${SUPABASE_STORAGE_URL:}
supabase.enabled=${SUPABASE_ENABLED:true}
app.file.storage-dir=${APP_FILE_STORAGE_DIR:${java.io.tmpdir}/iot-monitor/screenshots}
app.file.paths=${APP_FILE_PATHS:C:/shared-files}

