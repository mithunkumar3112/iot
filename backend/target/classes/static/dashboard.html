
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0ea5e9">
    <meta name="description" content="IoT Monitor - Access PC from phone, works OFFLINE">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230ea5e9' width='100' height='100'/><text x='50' y='70' font-size='60' fill='white' text-anchor='middle' font-weight='bold'>IOT</text></svg>">
    <title>IoT Monitor Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .install-banner {
            background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
            color: white;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
        }
        .install-banner button {
            background: white;
            color: #0ea5e9;
            border: none;
            padding: 8px 16px;
            border-radius: 3px;
            cursor: pointer;
            font-weight: bold;
            margin-left: 10px;
        }
        .battery-card {
            cursor: pointer;
            position: relative;
        }
        .battery-status {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }
        .battery-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .battery-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .battery-modal-content {
            background: white;
            padding: 30px;
            border-radius: 8px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        .battery-level {
            font-size: 48px;
            font-weight: bold;
            margin: 20px 0;
        }
        .battery-green { color: #10b981; }
        .battery-yellow { color: #f59e0b; }
        .battery-red { color: #ef4444; }
        .charging-indicator {
            color: #10b981;
            font-weight: bold;
        }
    </style>
    </style>
</head>

<body class="dark">

<div class="install-banner" id="installBanner">
    📲 <strong>Install App for Offline Access!</strong> Click below to save to home screen.
    <button onclick="installApp()">Install</button>
</div>

<h1>📊 IoT Monitoring Dashboard</h1>

<div class="menu">
    <a href="performance.html" class="menu-card">
        <div class="card-icon">📈</div>
        <div class="card-title">System Performance</div>
    </a>
    <a href="screen.html" class="menu-card">
        <div class="card-icon">📺</div>
        <div class="card-title">Screen Monitoring</div>
    </a>
    <a href="history.html" class="menu-card">
        <div class="card-icon">📜</div>
        <div class="card-title">History</div>
    </a>
    <a href="controls.html" class="menu-card">
        <div class="card-icon">🎛️</div>
        <div class="card-title">Controls</div>
    </a>
    <a href="files.html" class="menu-card">
        <div class="card-icon">📁</div>
        <div class="card-title">File Explorer</div>
    </a>
    <div class="menu-card battery-card" onclick="showBatteryModal()">
        <div class="card-icon" id="batteryIcon">🔋</div>
        <div class="card-title">Battery</div>
        <div class="battery-status" id="batteryStatus">Loading...</div>
    </div>
</div>
<button onclick="logout()" class="logout-btn">🚪 Logout</button>

<div class="battery-modal" id="batteryModal">
    <div class="battery-modal-content">
        <h2>🔋 Battery Status</h2>
        <div class="battery-level" id="batteryLevel">Loading...</div>
        <div id="chargingStatus"></div>
        <button onclick="closeBatteryModal()" style="margin-top: 20px; padding: 10px 20px; background: #0ea5e9; color: white; border: none; border-radius: 4px; cursor: pointer;">Close</button>
    </div>
</div>

<script src="navigation.js"></script>
<script>
    // ==========================================
    // REGISTER SERVICE WORKER
    // ==========================================
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('service-worker.js')
                .then(reg => console.log('✅ Service Worker registered'))
                .catch(err => console.log('⚠️ SW failed:', err));
        });
    }

    // ==========================================
    // PWA INSTALL PROMPT
    // ==========================================
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('installBanner').style.display = 'block';
    });

    function installApp() {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((choiceResult) => {
                if (choiceResult.outcome === 'accepted') {
                    console.log('✅ App installed!');
                    document.getElementById('installBanner').style.display = 'none';
                }
                deferredPrompt = null;
            });
        }
    }

    // ==========================================
    // BATTERY MONITORING
    // ==========================================
    function showBatteryModal() {
        document.getElementById('batteryModal').style.display = 'flex';
        loadBatteryData();
    }

    function closeBatteryModal() {
        document.getElementById('batteryModal').style.display = 'none';
    }

    async function loadBatteryData() {
        try {
            const deviceId = localStorage.getItem('deviceId') || 'default';
            const response = await fetch(`/system/battery/${deviceId}`);
            const data = await response.json();
            
            if (data.found) {
                const batteryLevel = Math.round(data.battery);
                const isCharging = data.charging;
                
                document.getElementById('batteryLevel').textContent = batteryLevel + '%';
                document.getElementById('batteryLevel').className = 'battery-level ' + getBatteryColorClass(batteryLevel);
                
                if (isCharging) {
                    document.getElementById('chargingStatus').innerHTML = '<span class="charging-indicator">⚡ Charging</span>';
                } else {
                    document.getElementById('chargingStatus').textContent = 'Not Charging';
                }
                
                // Update dashboard card
                document.getElementById('batteryStatus').textContent = batteryLevel + '% ' + (isCharging ? '⚡' : '');
                document.getElementById('batteryIcon').textContent = getBatteryIcon(batteryLevel, isCharging);
            } else {
                document.getElementById('batteryLevel').textContent = 'N/A';
                document.getElementById('chargingStatus').textContent = 'No battery data available';
            }
        } catch (error) {
            console.error('Error loading battery data:', error);
            document.getElementById('batteryLevel').textContent = 'Error';
            document.getElementById('chargingStatus').textContent = 'Failed to load battery data';
        }
    }

    function getBatteryColorClass(level) {
        if (level >= 50) return 'battery-green';
        if (level >= 20) return 'battery-yellow';
        return 'battery-red';
    }

    function getBatteryIcon(level, charging) {
        if (charging) return '🔋⚡';
        if (level >= 75) return '🔋';
        if (level >= 50) return '🔋';
        if (level >= 25) return '🪫';
        return '🪫';
    }

    // Load battery data on page load
    loadBatteryData();
    setInterval(loadBatteryData, 5000); // Update every 5 seconds

    // ==========================================
    // LOGOUT
    // ==========================================
    function logout() {
        if (confirm('Logout?')) {
            localStorage.removeItem('token');
            window.location = 'login.html';
        }
    }
</script>

</body>
</html>
