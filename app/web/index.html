<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laptop Monitor Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #6366f1;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-box: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        .glass {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 2rem;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 { font-size: 2rem; font-weight: 600; margin-bottom: 0.5rem; letter-spacing: -0.025em; }
        p { color: var(--text-muted); }

        .device-selector {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        input {
            flex: 1;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.2);
            color: white;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus { border-color: var(--primary); }

        button {
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }

        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .file-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 1.25rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .file-card:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); }

        .file-card h3 { font-size: 1rem; margin-bottom: 0.75rem; word-break: break-all; }
        .file-meta { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1rem; }
        .file-meta span { display: block; margin-bottom: 0.25rem; }

        .file-link {
            display: inline-block;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .loader {
            display: none;
            text-align: center;
            padding: 2rem;
            color: var(--primary);
        }

        /* NEW STYLES */
        .tabs { display: flex; gap: 0.5rem; margin-bottom: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; }
        .tab-btn { background: none; border: none; color: var(--text-muted); padding: 0.5rem 1rem; cursor: pointer; border-radius: 0.5rem; transition: all 0.2s; }
        .tab-btn.active { background: var(--primary); color: white; }
        .tab-btn:hover:not(.active) { background: rgba(255, 255, 255, 0.05); color: var(--text); }

        .filters { display: flex; gap: 0.5rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .filters input { min-width: 150px; }

        .timeline { list-style: none; position: relative; padding-left: 2rem; }
        .timeline::before { content: ''; position: absolute; left: 0.5rem; top: 0; bottom: 0; width: 2px; background: var(--border); }
        .timeline-item { position: relative; margin-bottom: 2rem; background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border); border-radius: 0.75rem; padding: 1rem; }
        .timeline-item::after { content: ''; position: absolute; left: -1.75rem; top: 1.25rem; width: 0.75rem; height: 0.75rem; background: var(--primary); border-radius: 50%; border: 3px solid var(--bg); }
        .timeline-item.alert { border-color: #ef4444; background: rgba(239, 68, 68, 0.05); }
        .timeline-item.alert::after { background: #ef4444; }

        .item-time { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem; display: block; }
        .item-title { font-weight: 600; margin-bottom: 0.25rem; display: block; }
        .item-details { font-size: 0.85rem; color: var(--text-muted); }
        .badge { display: inline-block; padding: 0.1rem 0.4rem; border-radius: 0.25rem; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; margin-right: 0.5rem; }
        .badge.alert { background: #ef4444; color: white; }
        .badge.process { background: var(--primary); color: white; }

        .notification-container { position: fixed; bottom: 2rem; right: 2rem; z-index: 1000; display: flex; flex-direction: column; gap: 1rem; pointer-events: none; }
        .toast { background: #1e293b; border: 1px solid #ef4444; border-left: 4px solid #ef4444; color: white; padding: 1rem 1.5rem; border-radius: 0.5rem; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); pointer-events: auto; animation: slideIn 0.3s ease-out; max-width: 350px; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .toast h4 { margin-bottom: 0.25rem; color: #ef4444; }
        .toast p { font-size: 0.9rem; color: var(--text-muted); margin: 0; }

    </style>
</head>
<body>

    <div class="glass">
        <header>
            <h1>Laptop Monitor Dashboard</h1>
            <p>Real-time monitoring and cloud synchronization</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" id="files-tab-btn">Files</button>
            <button class="tab-btn" id="history-tab-btn">Activity History</button>
        </div>

        <div id="files-section">
            <div class="device-selector">
                <input type="text" id="device-id-input" placeholder="e.g. Nandy-pc-1234">
                <button id="fetch-btn">View Files</button>
            </div>
            <div id="file-grid" class="file-grid"></div>
        </div>

        <div id="history-section" style="display: none;">
            <div class="filters">
                <input type="text" id="hist-device-id" placeholder="Device ID">
                <input type="text" id="hist-app-name" placeholder="App Name (Optional)">
                <button id="fetch-history-btn">Filter History</button>
            </div>
            <div id="history-timeline" class="timeline"></div>
        </div>

        <div id="loader" class="loader">Loading data...</div>
    </div>

    <!-- Notification Toast Container -->
    <div id="notification-container" class="notification-container"></div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
